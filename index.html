<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAI — AI Financial Expense Tracker</title>
<script>
  // Point this to your deployed backend if not running locally on port 5000
  window.FINAI_API_BASE = window.FINAI_API_BASE || 'http://localhost:5000/api';
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0f1a; --bg2: #131929; --bg3: #1c2540; --bg4: #222d4a;
    --surface: #1a2235; --surface2: #202d45;
    --accent: #5b8def; --accent2: #7c3aed; --accent3: #06d6a0;
    --accent4: #f59e0b; --accent5: #ef4444;
    --text: #e8edf7; --text2: #9aadc7; --text3: #5c7090;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --radius: 12px; --radius-sm: 8px; --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  [data-theme="light"] {
    --bg: #f0f4ff; --bg2: #ffffff; --bg3: #e8eef8; --bg4: #dce6f5;
    --surface: #ffffff; --surface2: #f5f8ff;
    --text: #0f172a; --text2: #475569; --text3: #94a3b8;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; font-family: var(--font); }
  input, select, textarea { font-family: var(--font); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* Layout */
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--bg2);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; z-index: 100; transition: transform 0.3s;
  }
  .sidebar.collapsed { width: 60px; }
  .sidebar-logo {
    padding: 20px 18px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; flex-shrink: 0;
  }
  .logo-text { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-section { padding: 8px 12px 4px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    border-radius: var(--radius-sm); margin: 2px 8px; cursor: pointer;
    color: var(--text2); font-size: 13.5px; font-weight: 500; transition: all 0.15s;
    white-space: nowrap; border: none; background: none; width: calc(100% - 16px);
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(91,141,239,0.15); color: var(--accent); }
  .nav-item i { font-size: 18px; flex-shrink: 0; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--accent5); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; }
  .user-card:hover { background: var(--bg3); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .user-email { font-size: 11px; color: var(--text3); }

  .main-content { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-width: 0; transition: margin 0.3s; }

  /* Topbar */
  .topbar {
    height: 60px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: transparent; color: var(--text2); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .search-bar {
    display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0 12px; height: 36px; min-width: 200px;
  }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; }
  .search-bar input::placeholder { color: var(--text3); }
  .notif-dot { position: relative; }
  .notif-dot::after { content: ''; position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent5); border: 2px solid var(--bg2); }

  /* Page content */
  .page-content { padding: 24px; flex: 1; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-lg { border-radius: var(--radius-lg); }

  /* Grid */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  .grid-3-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }

  /* Stat cards */
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; }
  .stat-card.income::before { background: linear-gradient(90deg, var(--accent3), #04c87e); }
  .stat-card.expense::before { background: linear-gradient(90deg, var(--accent5), #f97316); }
  .stat-card.savings::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-card.budget::before { background: linear-gradient(90deg, var(--accent4), #e67e22); }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .stat-change { font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--accent3); }
  .stat-change.down { color: var(--accent5); }
  .stat-icon { position: absolute; top: 16px; right: 16px; width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: 0.9; }
  .stat-icon.income { background: rgba(6,214,160,0.15); color: var(--accent3); }
  .stat-icon.expense { background: rgba(239,68,68,0.15); color: var(--accent5); }
  .stat-icon.savings { background: rgba(91,141,239,0.15); color: var(--accent); }
  .stat-icon.budget { background: rgba(245,158,11,0.15); color: var(--accent4); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; border: 1px solid transparent; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: #4a7de8; }
  .btn-secondary { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .btn-secondary:hover { background: var(--bg4); }
  .btn-danger { background: rgba(239,68,68,0.1); color: var(--accent5); border-color: rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-success { background: rgba(6,214,160,0.1); color: var(--accent3); border-color: rgba(6,214,160,0.2); }
  .btn-success:hover { background: rgba(6,214,160,0.2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 11px 14px; font-size: 13.5px; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .amount-pos { color: var(--accent3); font-weight: 600; }
  .amount-neg { color: var(--accent5); font-weight: 600; }

  /* Category badges */
  .badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
    border-radius: 20px; font-size: 11.5px; font-weight: 600;
  }
  .badge-food { background: rgba(245,158,11,0.15); color: var(--accent4); }
  .badge-travel { background: rgba(91,141,239,0.15); color: var(--accent); }
  .badge-shopping { background: rgba(124,58,237,0.15); color: #9f67f5; }
  .badge-bills { background: rgba(239,68,68,0.15); color: var(--accent5); }
  .badge-health { background: rgba(6,214,160,0.15); color: var(--accent3); }
  .badge-entertainment { background: rgba(236,72,153,0.15); color: #ec4899; }
  .badge-education { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-other { background: rgba(100,116,139,0.15); color: #94a3b8; }
  .badge-salary { background: rgba(6,214,160,0.15); color: var(--accent3); }

  /* Progress bar */
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

  /* Chart container */
  .chart-wrap { position: relative; width: 100%; }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); }

  /* Form elements */
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text2); margin-bottom: 7px; }
  .form-input {
    width: 100%; padding: 9px 13px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 13.5px; outline: none; transition: border 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  select.form-input { cursor: pointer; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-error { font-size: 11.5px; color: var(--accent5); margin-top: 5px; }

  /* Auth pages */
  .auth-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); padding: 20px;
  }
  .auth-container { width: 100%; max-width: 420px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; }
  .auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
  .auth-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .auth-subtitle { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 28px; }
  .auth-link { color: var(--accent); cursor: pointer; font-weight: 600; }
  .auth-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .auth-divider span { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .social-btn {
    width: 100%; padding: 10px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 13.5px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; transition: background 0.15s;
  }
  .social-btn:hover { background: var(--bg4); }

  /* Landing page */
  .landing { background: var(--bg); }
  .landing-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 32px; display: flex; align-items: center; background: rgba(11,15,26,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  [data-theme="light"] .landing-nav { background: rgba(240,244,255,0.9); }
  .landing-nav-logo { display: flex; align-items: center; gap: 10px; }
  .landing-nav-links { display: flex; align-items: center; gap: 28px; margin-left: 48px; }
  .landing-nav-links a { font-size: 14px; color: var(--text2); font-weight: 500; transition: color 0.15s; }
  .landing-nav-links a:hover { color: var(--text); }
  .landing-nav-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 20px 60px; position: relative; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(91,141,239,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 50%); }
  .hero-content { position: relative; z-index: 1; max-width: 760px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(91,141,239,0.12); border: 1px solid rgba(91,141,239,0.25); border-radius: 20px; padding: 6px 14px; font-size: 12.5px; color: var(--accent); font-weight: 600; margin-bottom: 24px; }
  .hero-title { font-size: clamp(36px, 6vw, 62px); font-weight: 800; line-height: 1.1; margin-bottom: 22px; }
  .hero-title span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero-sub { font-size: 18px; color: var(--text2); line-height: 1.6; margin-bottom: 36px; max-width: 560px; margin-left: auto; margin-right: auto; }
  .hero-actions { display: flex; align-items: center; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn-hero { padding: 13px 28px; font-size: 15px; border-radius: var(--radius); font-weight: 700; }
  .hero-stats { display: flex; align-items: center; justify-content: center; gap: 40px; margin-top: 52px; }
  .hero-stat { text-align: center; }
  .hero-stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
  .hero-stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .features-section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
  .section-eyebrow { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-bottom: 12px; }
  .section-title { font-size: clamp(26px, 4vw, 40px); font-weight: 800; text-align: center; margin-bottom: 14px; }
  .section-sub { font-size: 16px; color: var(--text2); text-align: center; margin-bottom: 52px; max-width: 520px; margin-left: auto; margin-right: auto; }
  .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 28px; transition: border-color 0.2s, transform 0.2s;
  }
  .feature-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .feature-icon { width: 44px; height: 44px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
  .feature-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .feature-desc { font-size: 13.5px; color: var(--text2); line-height: 1.6; }
  .pricing-section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 0; }
  .pricing-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 28px; display: flex; flex-direction: column;
  }
  .pricing-card.featured { border-color: var(--accent); background: rgba(91,141,239,0.06); }
  .pricing-badge { background: var(--accent); color: white; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 14px; width: fit-content; }
  .pricing-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .pricing-price { font-size: 36px; font-weight: 800; color: var(--text); }
  .pricing-price sup { font-size: 16px; vertical-align: top; margin-top: 8px; display: inline-block; }
  .pricing-price sub { font-size: 14px; color: var(--text2); font-weight: 400; }
  .pricing-desc { font-size: 13px; color: var(--text2); margin: 12px 0 20px; }
  .pricing-features { list-style: none; margin-bottom: 24px; flex: 1; }
  .pricing-features li { display: flex; align-items: center; gap: 9px; font-size: 13.5px; color: var(--text2); padding: 6px 0; }
  .pricing-features li i { color: var(--accent3); font-size: 16px; flex-shrink: 0; }
  .pricing-features li.na { opacity: 0.4; }
  .pricing-features li.na i { color: var(--text3); }
  .reviews-section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
  .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .review-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
  .review-stars { color: var(--accent4); font-size: 14px; margin-bottom: 12px; letter-spacing: 2px; }
  .review-text { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin-bottom: 16px; }
  .reviewer { display: flex; align-items: center; gap: 10px; }
  .reviewer-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
  .reviewer-name { font-size: 13.5px; font-weight: 600; }
  .reviewer-role { font-size: 11.5px; color: var(--text3); }
  .cta-section { padding: 80px 20px; text-align: center; }
  .cta-card { background: linear-gradient(135deg, rgba(91,141,239,0.15), rgba(124,58,237,0.15)); border: 1px solid rgba(91,141,239,0.2); border-radius: 24px; padding: 64px 40px; max-width: 700px; margin: 0 auto; }
  .cta-title { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
  .cta-sub { font-size: 16px; color: var(--text2); margin-bottom: 32px; }
  .footer { padding: 40px 32px; border-top: 1px solid var(--border); text-align: center; }
  .footer-text { font-size: 13px; color: var(--text3); }

  /* AI Insights */
  .insight-card { background: linear-gradient(135deg, rgba(91,141,239,0.08), rgba(124,58,237,0.08)); border: 1px solid rgba(91,141,239,0.15); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
  .insight-title { font-size: 13.5px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .insight-title i { color: var(--accent); }
  .insight-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .insight-tag { display: inline-block; background: rgba(91,141,239,0.12); color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-top: 8px; }

  /* Notification item */
  .notif-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }

<script>

// ============ API CLIENT (connects to Node.js/Express + MongoDB backend) ============
const API_BASE = window.FINAI_API_BASE || 'http://localhost:5000/api';

const api = {
  token: localStorage.getItem('finai_token') || null,
  setToken(t) { this.token = t; if (t) localStorage.setItem('finai_token', t); else localStorage.removeItem('finai_token'); },
  async request(path, { method = 'GET', body } = {}) {
    const res = await fetch(API_BASE + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(this.token ? { Authorization: 'Bearer ' + this.token } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || 'Request failed (' + res.status + ')');
    return data;
  },
  // Auth
  register: (name, email, password) => api.request('/auth/register', { method: 'POST', body: { name, email, password } }),
  login: (email, password) => api.request('/auth/login', { method: 'POST', body: { email, password } }),
  me: () => api.request('/auth/me'),
  // Transactions
  getTransactions: () => api.request('/transactions'),
  createTransaction: (tx) => api.request('/transactions', { method: 'POST', body: tx }),
  updateTransaction: (id, tx) => api.request('/transactions/' + id, { method: 'PUT', body: tx }),
  deleteTransaction: (id) => api.request('/transactions/' + id, { method: 'DELETE' }),
  getAnalyticsSummary: () => api.request('/transactions/analytics/summary'),
  // Budgets
  getBudgets: (month) => api.request('/budgets' + (month ? '?month=' + month : '')),
  upsertBudget: (category, limit, month) => api.request('/budgets', { method: 'POST', body: { category, limit, month } }),
  // Reminders / notifications
  getReminders: () => api.request('/reminders'),
  // AI
  getBudgetSuggestions: () => api.request('/ai/budget-suggestions'),
  askAI: (prompt) => api.request('/ai/insights', { method: 'POST', body: { prompt } }),
};

// ============ CHARTS ============
function BarChart({ id, labels, income, expense }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Income', data: income, backgroundColor: 'rgba(6,214,160,0.7)', borderRadius: 6, borderSkipped: false },
          { label: 'Expense', data: expense, backgroundColor: 'rgba(91,141,239,0.7)', borderRadius: 6, borderSkipped: false }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#9aadc7', font: { size: 12 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#9aadc7', font: { size: 12 }, callback: v => '₹' + (v/1000).toFixed(0) + 'k' } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return h('div', { className: 'chart-wrap', style: { height: 220 } },
    h('canvas', { id, ref, role: 'img', 'aria-label': 'Bar chart of monthly income vs expense' })
  );
}

function PieChart({ id, data }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d => d.label),
        datasets: [{ data: data.map(d => d.value), backgroundColor: data.map(d => d.color), borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '70%',
        plugins: { legend: { display: false } }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return h('div', { className: 'chart-wrap', style: { height: 200 } },
    h('canvas', { id, ref, role: 'img', 'aria-label': 'Doughnut chart of category-wise expenses' })
  );
}

function LineChart({ id, labels, data }) {

        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return h('div', { className: 'chart-wrap', style: { height: 200 } },

function Expenses({ transactions, setTransactions }) {
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ desc:'', amount:'', category:'Food', date:'', type:'expense' });
  const [errors, setErrors] = useState({});

  const cats = ['All', ...CATEGORIES];
  const filtered = transactions.filter(t =>
    (filter === 'All' || t.category === filter) &&
    (!search || t.desc.toLowerCase().includes(search.toLowerCase()))
  );

  function openAdd() { setForm({ desc:'', amount:'', category:'Food', date: new Date().toISOString().slice(0,10), type:'expense' }); setEditing(null); setErrors({}); setShowModal(true); }
  function openEdit(t) { setForm({ desc:t.desc, amount:Math.abs(t.amount), category:t.category, date:t.date, type:t.type }); setEditing(t.id || t._id); setErrors({}); setShowModal(true); }
  function validate() {
    const e = {};
    if (!form.desc.trim()) e.desc = 'Description required';
    if (!form.amount || isNaN(form.amount) || Number(form.amount) <= 0) e.amount = 'Enter a valid amount';
    if (!form.date) e.date = 'Date required';
    setErrors(e); return Object.keys(e).length === 0;
  }
  async function handleSave() {
    if (!validate()) return;
    const payload = { desc: form.desc, amount: Number(form.amount), category: form.category, date: form.date, type: form.type };
    try {
      if (editing) {
        const res = await api.updateTransaction(editing, payload);
        setTransactions(ts => ts.map(t => (t.id || t._id) === editing ? { ...res.transaction, id: res.transaction._id } : t));
      } else {
        const res = await api.createTransaction(payload);
        setTransactions(ts => [{ ...res.transaction, id: res.transaction._id }, ...ts]);
      }
      setShowModal(false);
    } catch (err) {
      setErrors({ desc: err.message || 'Could not save transaction (check backend connection)' });
    }
  }
  async function handleDelete(id) {
    try {
      await api.deleteTransaction(id);
      setTransactions(ts => ts.filter(t => (t.id || t._id) !== id));
    } catch (err) {
      alert(err.message || 'Could not delete transaction');
    }
  }

  return h('div', { className: 'page-content' },
    h('div', { className: 'section-header mb-6' },
      h('div', null,
        h('h2', { style:{fontSize:20,fontWeight:800,marginBottom:4} }, 'Expense Manager'),
        h('p', { style:{color:'var(--text2)',fontSize:13} }, filtered.length + ' transactions')
      ),
      h('button', { className:'btn btn-primary', onClick:openAdd }, h('i', { className:'ti ti-plus' }), 'Add Transaction')
    ),
    h('div', { className:'card mb-4', style:{padding:'14px 16px'} },
      h('div', { style:{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'} },
        h('div', { style:{flex:1,minWidth:180,display:'flex',alignItems:'center',gap:8,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'0 12px',height:36} },
          h('i', { className:'ti ti-search', style:{color:'var(--text3)',fontSize:15} }),
          h('input', { style:{background:'none',border:'none',outline:'none',color:'var(--text)',fontSize:13,width:'100%'}, placeholder:'Search...', value:search, onChange:e=>setSearch(e.target.value) })
        ),

          h('tbody', null, filtered.length === 0

    } catch (err) { /* backend not reachable yet */ }
    setLoading(false);

// ============ APP ============
function App() {
  const [theme, setThemeState] = useState('dark');
  const [auth, setAuthState] = useState(!!api.token);
  const [authPage, setAuthPage] = useState('login');
  const [showAuth, setShowAuth] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [transactions, setTransactions] = useState([]);
  const [dataLoading, setDataLoading] = useState(false);

  function setAuth(val) {
    setAuthState(val);
    if (!val) api.setToken(null);
  }
  window.finaiLogout = () => { setAuth(false); };

  function setTheme(t) {
    setThemeState(t);
    document.documentElement.setAttribute('data-theme', t);
  }

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, []);

  useEffect(() => {
    if (!auth) return;
    setDataLoading(true);
    api.getTransactions()
      .then(res => setTransactions((res.transactions || []).map(t => ({ ...t, id: t._id }))))
      .catch(() => { /* backend offline — start with an empty ledger */ })
      .finally(() => setDataLoading(false));
  }, [auth]);

  const pageTitles = { dashboard:'Dashboard', expenses:'Expenses', analytics:'Analytics', budget:'Budget', ai:'AI Insights', reports:'Reports', notifications:'Notifications', settings:'Settings' };

  if (!auth && !showAuth) {
    return h(Landing, { setAuth, setAuthPage, setShowAuth });
  }
  if (!auth && showAuth) {
    if (authPage === 'signup') return h(SignupPage, { setAuth, setPage: setAuthPage });
    if (authPage === 'forgot') return h(ForgotPage, { setPage: setAuthPage });
    return h(LoginPage, { setAuth, setPage: setAuthPage });
  }

  const pageMap = {
    dashboard: h(Dashboard, { setPage, transactions, loading: dataLoading }),
    expenses: h(Expenses, { transactions, setTransactions }),
    analytics: h(Analytics, { transactions }),
    budget: h(Budget),
    ai: h(AIInsights),
    reports: h(Analytics, { transactions }),
    notifications: h(Notifications),
    settings: h(Settings, { theme, setTheme }),
  };

  return h('div', { className:'app-layout' },
    h(Sidebar, { page, setPage, theme, setTheme }),
    h('div', { className:'main-content' },
      h(Topbar, { title: pageTitles[page] || 'Dashboard', theme, setTheme, setPage }),
      pageMap[page] || pageMap.dashboard
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
